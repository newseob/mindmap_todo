<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#efe4d4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="할일 마인드맵">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./mindmap_icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./mindmap_icon.svg">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2116213869162668"
       crossorigin="anonymous"></script>
  <title>Mind Map Studio</title>
  <style>
    :root {
      --text: #2f241b;
      --muted: #756656;
      --accent: #d06f45;
      --accent-strong: #a74826;
      --shadow: 0 18px 45px rgba(55, 37, 24, 0.16);
      --right-tray-width: 320px;
      --right-tray-gap: 22px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: "Segoe UI", "Malgun Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(246, 189, 96, 0.4), transparent 28%),
        radial-gradient(circle at bottom right, rgba(132, 165, 157, 0.45), transparent 24%),
        linear-gradient(135deg, #f7f1e8 0%, #efe4d4 100%);
    }

    .canvas-wrap,
    .canvas-wrap * {
      user-select: none;
      -webkit-user-select: none;
    }

    input,
    textarea {
      user-select: text;
      -webkit-user-select: text;
    }

    .canvas-wrap {
      display: grid;
      grid-template-columns: minmax(0, 1fr) var(--right-tray-width);
      min-height: 100vh;
      overflow: hidden;
    }

    .canvas-stage {
      position: relative;
      min-width: 0;
      min-height: 100vh;
      overflow: hidden;
    }

    .project-toolbar {
      position: relative;
      width: 100%;
      padding: 10px 14px 12px;
    }

    .project-trigger {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      min-width: 0;
      padding: 0;
    }

    .project-title {
      font-size: 0.88rem;
      color: var(--muted);
      font-weight: 700;
      flex: 0 0 auto;
    }

    .project-current {
      flex: 1;
      min-width: 0;
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent-strong);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .project-panel {
      position: static;
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      margin-top: 12px;
    }

    .project-panel[hidden] {
      display: none;
    }

    .project-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: min(48vh, 360px);
      overflow-y: auto;
    }

    .project-actions {
      display: flex;
      gap: 8px;
    }

    .project-actions button {
      flex: 1;
      padding: 9px 12px;
      font-size: 0.88rem;
    }

    .project-toolbar.open #projectMenuBtn::before {
      transform: translate(-50%, -50%) rotate(225deg);
    }

    .connect-mode-banner {
      position: absolute;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(47, 36, 27, 0.88);
      color: #fffaf4;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      box-shadow: 0 14px 30px rgba(31, 21, 15, 0.2);
      backdrop-filter: blur(10px);
      pointer-events: none;
    }

    .project-chip {
      width: 100%;
      padding: 11px 13px;
      border-radius: 14px;
      border: 1px solid rgba(124, 106, 88, 0.16);
      background: rgba(255, 250, 242, 0.9);
      color: var(--text);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 25px rgba(55, 37, 24, 0.08);
      text-align: left;
    }

    .project-chip:hover {
      background: rgba(248, 232, 214, 0.98);
    }

    .project-chip.active {
      background: var(--accent);
      color: #fffaf4;
      border-color: transparent;
    }

    .bottom-bar {
      position: absolute;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 12px;
      width: min(860px, calc(100% - 32px));
      padding: 14px;
      border-radius: 22px;
      background: rgba(255, 250, 242, 0.92);
      border: 1px solid rgba(124, 106, 88, 0.16);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }

    .right-tray {
      position: relative;
      width: 100%;
      min-height: 100vh;
      max-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 18px;
      overflow-y: auto;
      padding: 22px 18px;
      background: rgba(255, 248, 239, 0.88);
      border-left: 1px solid rgba(124, 106, 88, 0.16);
      box-shadow: inset 18px 0 30px rgba(55, 37, 24, 0.04);
    }

    .info-panel {
      width: 100%;
      padding: 14px 14px 12px;
      flex: 0 0 auto;
    }

    .info-panel h2,
    .info-panel h3 {
      margin: 0;
    }

    .info-panel h2 {
      font-size: 1.02rem;
    }

    .info-panel .today-panel-header {
      margin-bottom: 8px;
    }

    .info-panel p {
      margin: 6px 0 12px;
      font-size: 0.88rem;
      line-height: 1.6;
      color: var(--text);
    }

    .info-panel button {
      width: 100%;
    }

    .ad-panel {
      margin-top: auto;
    }

    .info-modal {
      position: fixed;
      inset: 0;
      z-index: 8;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(42, 31, 24, 0.34);
      backdrop-filter: blur(8px);
    }

    .info-modal[hidden] {
      display: none;
    }

    .info-modal-window {
      width: min(920px, calc(100vw - 48px));
      height: min(760px, calc(100vh - 48px));
      display: flex;
      flex-direction: column;
      border-radius: 24px;
      overflow: hidden;
      background: rgba(255, 250, 242, 0.98);
      border: 1px solid rgba(124, 106, 88, 0.16);
      box-shadow: 0 28px 60px rgba(28, 20, 15, 0.26);
    }

    .info-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      background: rgba(247, 239, 228, 0.96);
      border-bottom: 1px solid rgba(124, 106, 88, 0.14);
    }

    .info-modal-header h2 {
      margin: 0;
      font-size: 1rem;
    }

    .info-modal-close {
      min-width: 0;
      padding: 8px 12px;
    }

    .info-modal-frame {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fffdf9;
    }

    .right-tray > * {
      pointer-events: auto;
    }

    .bottom-bar .label {
      min-width: 78px;
      font-size: 0.9rem;
      color: var(--muted);
      order: 1;
    }

    input,
    button {
      font: inherit;
    }

    input {
      flex: 1;
      min-width: 0;
      width: 100%;
      border: 1px solid rgba(124, 106, 88, 0.22);
      border-radius: 12px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--text);
      order: 2;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 8px 12px;
      font-size: 0.92rem;
      background: var(--accent);
      color: #fffaf4;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease;
      box-shadow: 0 10px 25px rgba(55, 37, 24, 0.12);
    }

    button:hover {
      background: var(--accent-strong);
      transform: translateY(-1px);
    }

    button.secondary {
      background: #dbc9b7;
      color: var(--text);
    }

    button.secondary:hover {
      background: #cbb29a;
    }

    button:disabled {
      cursor: default;
      opacity: 0.5;
      box-shadow: none;
      transform: none;
    }

    button:disabled:hover {
      background: inherit;
      transform: none;
    }

    #renameBtn {
      order: 3;
    }

    #todayBtn {
      order: 4;
    }

    #addChildBtn {
      order: 5;
    }

    #connectBtn {
      order: 6;
    }

    #unlinkBtn {
      order: 7;
    }

    #deleteBtn {
      order: 8;
    }

    svg {
      width: 100%;
      height: 100vh;
      display: block;
    }

    .node text {
      pointer-events: none;
      fill: #fffdf8;
      font-size: 14px;
      font-weight: 600;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .node rect {
      rx: 18;
      ry: 18;
      stroke: rgba(47, 36, 27, 0.18);
      stroke-width: 1;
      filter: drop-shadow(0 14px 18px rgba(49, 34, 22, 0.14));
      transition: fill 140ms ease, stroke 140ms ease, stroke-width 140ms ease;
    }

    .node circle {
      stroke: rgba(47, 36, 27, 0.18);
      stroke-width: 1;
      filter: drop-shadow(0 14px 18px rgba(49, 34, 22, 0.14));
      transition: fill 140ms ease, stroke 140ms ease, stroke-width 140ms ease;
    }

    .node.selected rect {
      stroke: #fff7ee;
      stroke-width: 3;
    }

    .node.selected circle {
      stroke: #fff7ee;
      stroke-width: 3;
    }

    .node.connect-target rect,
    .node.connect-target circle {
      stroke: #a74826;
      stroke-width: 3.2;
    }

    .preview-node {
      cursor: pointer;
    }

    .preview-node rect {
      rx: 18;
      ry: 18;
      fill: rgba(255, 250, 242, 0.52);
      stroke: rgba(124, 106, 88, 0.52);
      stroke-width: 2;
      stroke-dasharray: 7 6;
      filter: drop-shadow(0 10px 16px rgba(49, 34, 22, 0.08));
    }

    .preview-node text {
      pointer-events: none;
      fill: var(--muted);
      font-size: 14px;
      font-weight: 700;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .node-badge {
      pointer-events: none;
    }

    .link {
      fill: none;
      stroke: rgba(95, 78, 61, 0.62);
      stroke-width: 3;
      stroke-linecap: round;
      transition: stroke 140ms ease, stroke-width 140ms ease;
    }

    .side-panel {
      border-radius: 20px;
      background: rgba(255, 250, 242, 0.94);
      border: 1px solid rgba(124, 106, 88, 0.16);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }

    .today-panel {
      position: relative;
      width: 100%;
      max-height: min(46vh, 420px);
      overflow: auto;
      padding: 14px 14px 12px;
    }

    .today-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .today-panel h2 {
      margin: 0;
      font-size: 0.98rem;
    }

    .today-toggle {
      flex: 0 0 auto;
      width: auto;
      height: auto;
      min-width: 0;
      padding: 0;
      margin: 0 4px 0 0;
      border: none;
      background: transparent;
      appearance: none;
      position: relative;
      box-shadow: none;
    }

    .today-toggle::before {
      content: "";
      position: absolute;
      top: 24%;
      left: 50%;
      width: 8px;
      height: 8px;
      border-right: 1.8px solid var(--text);
      border-bottom: 1.8px solid var(--text);
      transform: translate(-50%, -50%) rotate(45deg);
      transition: transform 140ms ease, border-color 120ms ease;
    }

    .today-toggle:hover::before {
      border-color: var(--accent-strong);
    }

    .today-toggle:hover {
      background: transparent;
      transform: none;
    }

    .collapsible-panel.collapsed {
      overflow: hidden;
      padding-bottom: 8px;
    }

    .collapsible-panel.collapsed .panel-body {
      display: none;
    }

    .collapsible-panel.collapsed .panel-toggle {
      transform: none;
    }

    .collapsible-panel.collapsed .panel-toggle::before {
      transform: translate(-50%, -50%) rotate(225deg);
    }

    .today-panel .empty {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .today-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .memo-panel {
      position: relative;
      width: 100%;
      max-height: min(42vh, 400px);
      overflow: visible;
      padding: 7px 14px 8px;
    }

    .memo-panel .today-panel-header {
      margin-bottom: 2px;
    }

    .memo-panel h2 {
      font-size: 0.98rem;
      line-height: 1.2;
    }

    .memo-panel .panel-body {
      margin-top: 0;
    }

    .memo-input {
      display: block;
      margin: 0;
      width: 100%;
      min-height: 96px;
      resize: none;
      overflow: hidden;
      border: 1px solid rgba(124, 106, 88, 0.18);
      border-radius: 14px;
      padding: 8px 11px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--text);
      line-height: 1.55;
    }

    .memo-input:focus {
      outline: 2px solid rgba(208, 111, 69, 0.2);
      border-color: rgba(208, 111, 69, 0.42);
    }

    .ad-panel {
      width: 100%;
      padding: 12px 14px 14px;
    }

    .ad-panel h2 {
      margin: 0 0 10px;
      font-size: 0.98rem;
      line-height: 1.2;
    }

    .ad-slot-box {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 112px;
      padding: 14px;
      border-radius: 16px;
      border: 1px dashed rgba(124, 106, 88, 0.24);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.78), rgba(246, 237, 225, 0.82));
      color: var(--muted);
      text-align: center;
      line-height: 1.55;
    }

    .ad-slot-box strong {
      display: block;
      margin-bottom: 4px;
      color: var(--accent-strong);
      font-size: 0.92rem;
    }

    .today-item {
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(124, 106, 88, 0.12);
    }

    .today-item .path {
      margin: 0 0 4px;
      font-size: 0.76rem;
      color: var(--muted);
      line-height: 1.4;
    }

    .today-item .task {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
    }

    .context-menu {
      position: fixed;
      z-index: 5;
      min-width: 112px;
      max-width: 188px;
      padding: 7px;
      border-radius: 16px;
      background: rgba(255, 250, 242, 0.97);
      border: 1px solid rgba(124, 106, 88, 0.16);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 36px rgba(55, 37, 24, 0.18);
    }

    .context-menu[hidden] {
      display: none;
    }

    .context-menu button {
      width: 100%;
      padding: 9px 11px;
      border-radius: 10px;
      background: transparent;
      color: var(--text);
      text-align: left;
      box-shadow: none;
      font-size: 0.88rem;
      line-height: 1.25;
    }

    .context-menu button:first-of-type {
      margin-bottom: 6px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(124, 106, 88, 0.18);
    }

    .context-menu button:nth-of-type(5) {
      margin-top: 6px;
      padding-top: 12px;
      border-top: 1px solid rgba(124, 106, 88, 0.18);
    }

    .context-menu button:hover {
      background: rgba(219, 201, 183, 0.68);
      transform: none;
    }

    #nodeContextDeleteBtn,
    #nodeContextDeleteOnlyBtn {
      color: #b03a2e;
    }

    #nodeContextDeleteBtn:hover,
    #nodeContextDeleteOnlyBtn:hover {
      color: #942d22;
      background: rgba(231, 178, 171, 0.28);
    }

    .context-menu button:disabled {
      color: rgba(117, 102, 86, 0.7);
      background: transparent;
      opacity: 1;
    }

    button.active {
      background: var(--accent-strong);
      color: #fffaf4;
    }

    @media (max-width: 900px) {
      .canvas-wrap {
        grid-template-columns: 1fr;
      }

      .canvas-stage {
        min-height: 100vh;
      }

      .bottom-bar {
        left: 16px;
        right: 16px;
        bottom: 16px;
        transform: none;
        width: auto;
        flex-wrap: wrap;
        gap: 8px;
      }

      .bottom-bar .label {
        min-width: 58px;
        width: auto;
        flex: 0 0 auto;
        font-size: 0.82rem;
      }

      .bottom-bar input {
        flex: 1 1 calc(100% - 112px);
        max-width: 220px;
        width: auto;
        min-width: 0;
      }

      .bottom-bar button {
        flex: 1 1 calc(25% - 6px);
        white-space: nowrap;
        padding-inline: 9px;
        font-size: 0.84rem;
      }

      .right-tray {
        min-height: 0;
        max-height: 42vh;
        padding: 16px;
        border-left: none;
        border-top: 1px solid rgba(124, 106, 88, 0.16);
        box-shadow: inset 0 12px 24px rgba(55, 37, 24, 0.04);
      }

      .today-panel {
        width: auto;
        max-height: 32vh;
      }

      .project-toolbar {
        padding: 10px 14px 12px;
      }

      .project-trigger,
      .project-panel {
        width: 100%;
      }

      .project-trigger {
        min-width: 0;
      }

      .info-modal {
        padding: 12px;
      }

      .info-modal-window {
        width: calc(100vw - 24px);
        height: calc(100vh - 24px);
      }
    }
  </style>
</head>
<body>
  <main class="canvas-wrap">
    <section class="canvas-stage">
      <div id="connectModeBanner" class="connect-mode-banner" hidden>노드 연결 모드입니다. 연결할 부모 노드를 선택하거나 빈 공간 클릭, Esc로 취소하세요.</div>

      <svg id="mindmap" viewBox="0 0 1400 900" aria-label="mind map canvas">
        <g id="viewport">
          <g id="links"></g>
          <g id="nodes"></g>
        </g>
      </svg>

      <div class="bottom-bar">
        <button id="todayBtn" class="secondary" hidden>오늘할일</button>
        <span class="label">선택 노드</span>
        <input id="nodeLabel" type="text" placeholder="노드 제목">
        <button id="renameBtn" hidden>이름 변경</button>
        <button id="addChildBtn" class="secondary" hidden>노드 추가</button>
        <button id="deleteBtn" class="secondary">삭제</button>
        <button id="connectBtn" class="secondary" hidden>노드 연결</button>
        <button id="unlinkBtn" class="secondary" hidden>연결 해제</button>
      </div>
    </section>
    <aside class="right-tray" aria-label="우측 트레이">
      <aside class="project-toolbar side-panel" aria-live="polite">
        <div class="today-panel-header">
          <div class="project-trigger">
            <span class="project-title">프로젝트 :</span>
            <span id="currentProjectName" class="project-current">프로젝트 1</span>
          </div>
          <button id="projectMenuBtn" class="today-toggle panel-toggle" type="button" aria-expanded="false" aria-controls="projectPanel" aria-label="프로젝트 목록 열기"></button>
        </div>
        <div id="projectPanel" class="project-panel" hidden>
          <div id="projectList" class="project-list"></div>
          <div class="project-actions">
            <button id="addProjectBtn" class="secondary" type="button">추가</button>
            <button id="deleteProjectBtn" class="secondary" type="button">삭제</button>
          </div>
        </div>
      </aside>
      <aside id="todayPanel" class="today-panel side-panel collapsible-panel" aria-live="polite">
        <div class="today-panel-header">
          <h2>오늘할일</h2>
          <button id="todayPanelToggle" class="today-toggle panel-toggle" type="button" aria-expanded="true" aria-label="오늘할일 숨기기"></button>
        </div>
        <div id="todayList" class="today-list panel-body"></div>
      </aside>
      <aside id="memoPanel" class="memo-panel side-panel collapsible-panel" aria-live="polite">
        <div class="today-panel-header">
          <h2>메모</h2>
          <button id="memoPanelToggle" class="today-toggle panel-toggle" type="button" aria-expanded="true" aria-label="메모 숨기기"></button>
        </div>
        <div class="panel-body">
          <textarea id="memoInput" class="memo-input" placeholder="오늘할일과 함께 참고할 메모를 적어두세요."></textarea>
        </div>
      </aside>
      <aside id="infoPanel" class="info-panel side-panel collapsible-panel" aria-label="앱 안내">
        <h2>앱 안내</h2>
        <p>마인드맵 할일은 프로젝트와 할 일을 마인드맵 구조로 정리하고, 오늘할일과 메모를 함께 관리할 수 있는 작업 정리 앱입니다.</p>
        <button id="openInfoWindowBtn" class="secondary" type="button">자세히 알아보기</button>
      </aside>
      <aside id="adPanel" class="ad-panel side-panel" aria-label="광고 영역">
        <h2>광고</h2>
        <div class="ad-slot-box">
          <!-- 웹앱 광고 -->
          <ins class="adsbygoogle"
               style="display:block"
               data-ad-client="ca-pub-2116213869162668"
               data-ad-slot="4304571154"
               data-ad-format="auto"
               data-full-width-responsive="true"></ins>
        </div>
        <script>
          (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
      </aside>
    </aside>
    <div id="infoModal" class="info-modal" hidden>
      <div class="info-modal-window" role="dialog" aria-modal="true" aria-labelledby="infoModalTitle">
        <div class="info-modal-header">
          <h2 id="infoModalTitle">앱 안내</h2>
          <button id="closeInfoWindowBtn" class="secondary info-modal-close" type="button">닫기</button>
        </div>
        <iframe id="infoModalFrame" class="info-modal-frame" src="./app-guide.html" title="앱 안내 페이지"></iframe>
      </div>
    </div>
    <div id="nodeContextMenu" class="context-menu" hidden>
      <button id="nodeContextTodayBtn" type="button">오늘할일</button>
      <button id="nodeContextAddBtn" type="button">노드 추가</button>
      <button id="nodeContextConnectBtn" type="button">노드 연결</button>
      <button id="nodeContextUnlinkBtn" type="button">노드 연결 해제</button>
      <button id="nodeContextDeleteOnlyBtn" type="button">삭제</button>
      <button id="nodeContextDeleteBtn" type="button">삭제(하위 노드 포함)</button>
    </div>
    <div id="canvasContextMenu" class="context-menu" hidden>
      <button id="canvasContextAddBtn" type="button">새 노드 추가</button>
    </div>
  </main>
  <script>
    const STORAGE_KEY = "mind-map-studio-json";
    const PAN_SENSITIVITY = 1.35;
    const STORAGE_VERSION = 2;
    const HISTORY_LIMIT = 100;
    const NODE_WIDTH = 160;
    const NODE_HEIGHT = 60;
    const ROOT_RADIUS = 42;
    const DEPTH_SCALE_STEP = 0.08;
    const MIN_NODE_SCALE = 0.7;
    const NODE_HORIZONTAL_PADDING = 89;
    const ROOT_PADDING = 84;
    const MIN_FONT_SIZE = 11;
    const BASE_FONT_SIZE = 14;
    const DEPTH_COLORS = [
      "#e58989",
      "#df9d84",
      "#e6c779",
      "#8fbd7e",
      "#68b9ae",
      "#7aaedf",
      "#7b7fca",
      "#aa7dcb",
      "#d784b8",
      "#8f8f8f"
    ];
    const FADED_DEPTH_COLORS = [
      "#ecd0d0",
      "#ead7cd",
      "#ece0bf",
      "#d7e5d1",
      "#d2e3e0",
      "#d5e0ec",
      "#d6d8ea",
      "#e0d6ea",
      "#ead5e2",
      "#dddddd"
    ];

        const sampleData = {
      id: crypto.randomUUID(),
      label: "새 프로젝트",
      x: 700,
      y: 420,
      today: false,
      children: []
    };

    const svg = document.getElementById("mindmap");
    const viewport = document.getElementById("viewport");
    const linksLayer = document.getElementById("links");
    const nodesLayer = document.getElementById("nodes");
    const nodeLabelInput = document.getElementById("nodeLabel");
    const todayBtn = document.getElementById("todayBtn");
    const connectBtn = document.getElementById("connectBtn");
    const unlinkBtn = document.getElementById("unlinkBtn");
    const todayPanel = document.getElementById("todayPanel");
    const todayPanelToggle = document.getElementById("todayPanelToggle");
    const todayList = document.getElementById("todayList");
    const memoPanel = document.getElementById("memoPanel");
    const memoPanelToggle = document.getElementById("memoPanelToggle");
    const memoInput = document.getElementById("memoInput");
    const openInfoWindowBtn = document.getElementById("openInfoWindowBtn");
    const infoModal = document.getElementById("infoModal");
    const closeInfoWindowBtn = document.getElementById("closeInfoWindowBtn");
    const nodeContextMenu = document.getElementById("nodeContextMenu");
    const nodeContextTodayBtn = document.getElementById("nodeContextTodayBtn");
    const nodeContextAddBtn = document.getElementById("nodeContextAddBtn");
    const nodeContextConnectBtn = document.getElementById("nodeContextConnectBtn");
    const nodeContextUnlinkBtn = document.getElementById("nodeContextUnlinkBtn");
    const nodeContextDeleteBtn = document.getElementById("nodeContextDeleteBtn");
    const nodeContextDeleteOnlyBtn = document.getElementById("nodeContextDeleteOnlyBtn");
    const canvasContextMenu = document.getElementById("canvasContextMenu");
    const canvasContextAddBtn = document.getElementById("canvasContextAddBtn");
    const connectModeBanner = document.getElementById("connectModeBanner");
    const projectToolbar = document.querySelector(".project-toolbar");
    const projectMenuBtn = document.getElementById("projectMenuBtn");
    const projectPanel = document.getElementById("projectPanel");
    const currentProjectName = document.getElementById("currentProjectName");
    const projectList = document.getElementById("projectList");
    const addProjectBtn = document.getElementById("addProjectBtn");
    const deleteProjectBtn = document.getElementById("deleteProjectBtn");

    let appState = loadState();
    let state = getActiveProject().data;
    let selectedId = null;
    let scale = 1;
    let translate = { x: 0, y: 0 };
    let dragInfo = null;
    let panInfo = null;
    let contextMenuNodeId = null;
    let canvasContextPoint = null;
    let isProjectMenuOpen = false;
    let connectModeNodeId = null;
    let connectHoverNodeId = null;
    let undoStack = [];
    let memoHistorySnapshot = null;

    function createHistorySnapshot() {
      return {
        appState: structuredClone(appState),
        selectedId,
        scale,
        translate: { ...translate },
        connectModeNodeId,
        connectHoverNodeId
      };
    }

    function snapshotSignature(snapshot) {
      return JSON.stringify(snapshot);
    }

    function pushUndoSnapshot(snapshot = createHistorySnapshot()) {
      const nextSignature = snapshotSignature(snapshot);
      const lastSnapshot = undoStack[undoStack.length - 1];
      if (lastSnapshot && snapshotSignature(lastSnapshot) === nextSignature) {
        return;
      }
      undoStack.push(snapshot);
      if (undoStack.length > HISTORY_LIMIT) {
        undoStack.shift();
      }
    }

    function restoreHistorySnapshot(snapshot) {
      appState = structuredClone(snapshot.appState);
      selectedId = snapshot.selectedId;
      scale = snapshot.scale;
      translate = { ...snapshot.translate };
      connectModeNodeId = snapshot.connectModeNodeId;
      connectHoverNodeId = snapshot.connectHoverNodeId;
      dragInfo = null;
      panInfo = null;
      contextMenuNodeId = null;
      memoHistorySnapshot = null;
      syncActiveProjectState();
      hideNodeContextMenu();
      render();
    }

    function undoLastAction() {
      const snapshot = undoStack.pop();
      if (!snapshot) return;
      restoreHistorySnapshot(snapshot);
    }

    function loadState() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return createDefaultProjectsState();
      try {
        const parsed = JSON.parse(saved);
        if (parsed && parsed.version === STORAGE_VERSION && Array.isArray(parsed.projects)) {
          return normalizeProjectsState(parsed);
        }
        if (parsed?.data?.id) {
          return createProjectsStateFromTree(parsed.data);
        }
        if (parsed?.id) {
          return createProjectsStateFromTree(parsed);
        }
        return createDefaultProjectsState();
      } catch {
        return createDefaultProjectsState();
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        version: STORAGE_VERSION,
        savedAt: new Date().toISOString(),
        activeProjectId: appState.activeProjectId,
        todayPanelCollapsed: Boolean(appState.todayPanelCollapsed),
        memoPanelCollapsed: Boolean(appState.memoPanelCollapsed),
        memo: typeof appState.memo === "string" ? appState.memo : "",
        projects: appState.projects
      }));
    }

    function flatten(node, parent = null, list = []) {
      list.push({ node, parent });
      node.children.forEach((child) => flatten(child, node, list));
      return list;
    }

    function normalizeTree(node) {
      node.today = Boolean(node.today);
      node.detached = Boolean(node.detached);
      node.children = Array.isArray(node.children) ? node.children : [];
      node.children.forEach(normalizeTree);
      return node;
    }

    function createProjectData() {
      return normalizeTree(structuredClone(sampleData));
    }

    function createProject(name = `프로젝트 ${Date.now()}`) {
      const data = createProjectData();
      data.label = name;
      return {
        id: crypto.randomUUID(),
        name,
        data
      };
    }

    function createDefaultProjectsState() {
      const firstProject = createProject("프로젝트 1");
      return {
        activeProjectId: firstProject.id,
        todayPanelCollapsed: false,
        memoPanelCollapsed: false,
        memo: "",
        projects: [firstProject]
      };
    }

    function createProjectsStateFromTree(tree) {
      const firstProject = {
        id: crypto.randomUUID(),
        name: "프로젝트 1",
        data: normalizeTree(tree)
      };
      return {
        activeProjectId: firstProject.id,
        todayPanelCollapsed: false,
        memoPanelCollapsed: false,
        memo: "",
        projects: [firstProject]
      };
    }

    function normalizeProjectsState(rawState) {
      const projects = rawState.projects
        .filter((project) => project?.data?.id)
        .map((project, index) => ({
          id: project.id || crypto.randomUUID(),
          name: project.name || `프로젝트 ${index + 1}`,
          data: normalizeTree(project.data)
        }));

      if (!projects.length) {
        return createDefaultProjectsState();
      }

      const activeProjectId = projects.some((project) => project.id === rawState.activeProjectId)
        ? rawState.activeProjectId
        : projects[0].id;

      return {
        activeProjectId,
        todayPanelCollapsed: Boolean(rawState.todayPanelCollapsed),
        memoPanelCollapsed: Boolean(rawState.memoPanelCollapsed),
        memo: typeof rawState.memo === "string" ? rawState.memo : "",
        projects
      };
    }

    function getProjectTitle(project) {
      return project?.data?.label?.trim() || project?.name || "프로젝트";
    }

    function getActiveProject() {
      const activeProject = appState.projects.find((project) => project.id === appState.activeProjectId);
      return activeProject || appState.projects[0];
    }

    function syncActiveProjectState() {
      state = getActiveProject().data;
      if (selectedId && !findNode(selectedId, state)) {
        selectedId = null;
      }
    }

    function collectSubtree(node, list = []) {
      list.push(node);
      node.children.forEach((child) => {
        if (node.id === state.id && child.detached) return;
        collectSubtree(child, list);
      });
      return list;
    }

    function getAncestorIds(targetId, node = state, trail = []) {
      if (node.id === targetId) {
        return [...trail, node.id];
      }
      for (const child of node.children) {
        const found = getAncestorIds(targetId, child, [...trail, node.id]);
        if (found) return found;
      }
      return null;
    }

    function findNode(id, node = state, parent = null) {
      if (node.id === id) return { node, parent };
      for (const child of node.children) {
        const result = findNode(id, child, node);
        if (result) return result;
      }
      return null;
    }

    function isRootNode(node) {
      return node.id === state.id;
    }

    function getAncestorLabels(targetId, node = state, trail = []) {
      if (node.id === targetId) {
        return [...trail, node.label];
      }
      for (const child of node.children) {
        const found = getAncestorLabels(targetId, child, [...trail, node.label]);
        if (found) return found;
      }
      return null;
    }

    function getNodeScale(depth) {
      return Math.max(MIN_NODE_SCALE, 1 - depth * DEPTH_SCALE_STEP);
    }

    function getFontSize(scale) {
      return Math.max(MIN_FONT_SIZE, BASE_FONT_SIZE * scale);
    }

    function estimateLabelWidth(label, fontSize) {
      let units = 0;
      for (const char of label) {
        if (/\s/.test(char)) {
          units += 0.34;
        } else if (/[A-Z0-9]/.test(char)) {
          units += 0.68;
        } else if (/[a-z]/.test(char)) {
          units += 0.58;
        } else if (/[\u3131-\u318E\uAC00-\uD7A3\u3040-\u30FF\u4E00-\u9FFF]/.test(char)) {
          units += 0.95;
        } else {
          units += 0.72;
        }
      }
      return Math.max(fontSize * 2.2, units * fontSize);
    }

    function getMetricsForLabel(label, depth, isRoot = false) {
      const scale = getNodeScale(depth);
      const fontSize = getFontSize(scale);
      const labelWidth = estimateLabelWidth(label, fontSize);

      if (isRoot) {
        const radius = Math.max(ROOT_RADIUS * scale, (labelWidth + ROOT_PADDING) / 2);
        return { depth, scale, fontSize, labelWidth, radius, width: radius * 2, height: radius * 2 };
      }

      return {
        depth,
        scale,
        fontSize,
        labelWidth,
        width: Math.max(NODE_WIDTH * scale, labelWidth + NODE_HORIZONTAL_PADDING),
        height: NODE_HEIGHT * scale
      };
    }

    function getNodeMetrics(node) {
      return getMetricsForLabel(node.label, getDepth(node.id), isRootNode(node));
    }

    function getNodeAnchor(node, target, metrics = getNodeMetrics(node), isRoot = isRootNode(node)) {
      const dx = target.x - node.x;
      const dy = target.y - node.y;

      if (isRoot) {
        const distance = Math.hypot(dx, dy) || 1;
        return {
          x: node.x + (dx / distance) * metrics.radius,
          y: node.y + (dy / distance) * metrics.radius
        };
      }

      const halfWidth = metrics.width / 2;
      const halfHeight = metrics.height / 2;

      if (Math.abs(dx) >= Math.abs(dy) * 0.3) {
        return {
          x: node.x + (dx >= 0 ? halfWidth : -halfWidth),
          y: node.y
        };
      }

      return {
        x: node.x,
        y: node.y + (dy >= 0 ? halfHeight : -halfHeight)
      };
    }

    function buildPath(from, to, options = {}) {
      const start = getNodeAnchor(from, to, options.fromMetrics, options.fromIsRoot);
      const end = getNodeAnchor(to, from, options.toMetrics, options.toIsRoot);
      const dx = end.x - start.x;
      const dy = end.y - start.y;
      const absDx = Math.abs(dx);
      const absDy = Math.abs(dy);
      const horizontalPull = Math.max(40, Math.min(150, absDx * 0.42));
      const verticalPull = Math.max(18, Math.min(110, absDy * 0.3));
      const startControlX = start.x + Math.sign(dx || 1) * horizontalPull;
      const endControlX = end.x - Math.sign(dx || 1) * horizontalPull;
      const startControlY = start.y + Math.sign(dy) * verticalPull;
      const endControlY = end.y - Math.sign(dy) * verticalPull;

      return `M ${start.x} ${start.y} C ${startControlX} ${startControlY}, ${endControlX} ${endControlY}, ${end.x} ${end.y}`;
    }

    function colorForDepth(depth) {
      if (depth < DEPTH_COLORS.length) {
        return DEPTH_COLORS[depth];
      }
      const step = Math.min(depth - DEPTH_COLORS.length, 8);
      const tone = 150 + step * 10;
      return `rgb(${tone}, ${tone}, ${tone})`;
    }

    function fadedNodeColor(depth) {
      if (depth < FADED_DEPTH_COLORS.length) {
        return FADED_DEPTH_COLORS[depth];
      }
      const step = Math.min(depth - FADED_DEPTH_COLORS.length, 8);
      const tone = 208 + step * 5;
      return `rgb(${tone}, ${tone}, ${tone})`;
    }

    function getDepth(targetId) {
      const walk = (node, depth) => {
        if (node.id === targetId) return depth;
        for (const child of node.children) {
          const found = walk(child, depth + 1);
          if (found !== -1) return found;
        }
        return -1;
      };
      return walk(state, 0);
    }

    function getPreviewNode(parentId) {
      const parentResult = findNode(parentId);
      if (!parentResult) return null;
      const parent = parentResult.node;
      const depth = getDepth(parentId) + 1;
      const label = "새 노드";
      const metrics = getMetricsForLabel(label, depth, false);
      return {
        id: `preview-${parent.id}`,
        parentId: parent.id,
        label,
        x: parent.x + 220,
        y: parent.y + Math.max(parent.children.length, 0) * 90 - 40,
        metrics
      };
    }

    function render() {
      linksLayer.innerHTML = "";
      nodesLayer.innerHTML = "";
      const selectedResult = selectedId ? findNode(selectedId) : null;
      const relatedIds = new Set();

      if (selectedResult) {
        collectSubtree(selectedResult.node).forEach((node) => relatedIds.add(node.id));
        (getAncestorIds(selectedId) || []).forEach((id) => relatedIds.add(id));
      }

      const items = flatten(state);
      items.forEach(({ node, parent }) => {
        if (parent && !node.detached) {
          const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          path.setAttribute("class", "link");
          path.setAttribute("d", buildPath(parent, node));
          const isRelated = !selectedResult || (relatedIds.has(node.id) && relatedIds.has(parent.id));
          path.style.stroke = isRelated ? "rgba(95, 78, 61, 0.62)" : "#d8cec2";
          path.style.strokeWidth = node.id === selectedId || parent.id === selectedId ? "4" : "3";
          linksLayer.appendChild(path);
        }
      });

      if (connectModeNodeId && connectHoverNodeId) {
        const sourceNode = findNode(connectModeNodeId)?.node;
        const hoverTargetNode = findNode(connectHoverNodeId)?.node;
        if (sourceNode && hoverTargetNode) {
          const connectPreviewPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
          connectPreviewPath.setAttribute("class", "link");
          connectPreviewPath.setAttribute("d", buildPath(hoverTargetNode, sourceNode));
          connectPreviewPath.style.stroke = "rgba(167, 72, 38, 0.72)";
          connectPreviewPath.style.strokeDasharray = "10 8";
          connectPreviewPath.style.strokeWidth = "3";
          linksLayer.appendChild(connectPreviewPath);
        }
      }

      if (selectedResult && !connectModeNodeId) {
        const previewNode = getPreviewNode(selectedResult.node.id);
        if (previewNode) {
          const previewPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
          previewPath.setAttribute("class", "link");
          previewPath.setAttribute(
            "d",
            buildPath(selectedResult.node, previewNode, {
              toMetrics: previewNode.metrics,
              toIsRoot: false
            })
          );
          previewPath.style.stroke = "rgba(124, 106, 88, 0.34)";
          previewPath.style.strokeDasharray = "8 7";
          previewPath.style.strokeWidth = "2.5";
          linksLayer.appendChild(previewPath);
        }
      }

      items.forEach(({ node }) => {
        const isRoot = isRootNode(node);
        const metrics = getNodeMetrics(node);
        const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
        group.setAttribute("class", `node${node.id === selectedId ? " selected" : ""}${node.id === connectHoverNodeId ? " connect-target" : ""}`);
        group.dataset.id = node.id;
        group.setAttribute(
          "transform",
          isRoot
            ? `translate(${node.x - metrics.radius}, ${node.y - metrics.radius})`
            : `translate(${node.x - metrics.width / 2}, ${node.y - metrics.height / 2})`
        );

        const shape = document.createElementNS("http://www.w3.org/2000/svg", isRoot ? "circle" : "rect");
        if (isRoot) {
          shape.setAttribute("cx", String(metrics.radius));
          shape.setAttribute("cy", String(metrics.radius));
          shape.setAttribute("r", String(metrics.radius));
        } else {
          shape.setAttribute("width", String(metrics.width));
          shape.setAttribute("height", String(metrics.height));
        }
        const isRelated = !selectedResult || relatedIds.has(node.id);
        shape.setAttribute("fill", isRelated ? colorForDepth(getDepth(node.id)) : fadedNodeColor(getDepth(node.id)));
        shape.setAttribute("stroke", node.today ? "#a74826" : isRelated ? "rgba(47, 36, 27, 0.18)" : "#d7cdc0");
        if (node.today) {
          shape.setAttribute("stroke-width", "2.4");
        }

        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
        text.setAttribute("x", String(isRoot ? metrics.radius : metrics.width / 2));
        text.setAttribute("y", String(isRoot ? metrics.radius + 2 : metrics.height / 2 + 2));
        text.setAttribute("font-size", String(metrics.fontSize));
        text.textContent = node.label;

        group.append(shape, text);

        if (node.today) {
          const badgeRadius = Math.max(8, Math.min(11, metrics.height * 0.18));
          const badgeX = isRoot
            ? metrics.width - badgeRadius * 0.45
            : metrics.width - badgeRadius * 0.35;
          const badgeY = isRoot
            ? badgeRadius * 0.55
            : badgeRadius * 0.65;
          const badge = document.createElementNS("http://www.w3.org/2000/svg", "g");
          badge.setAttribute("class", "node-badge");

          const badgeCircle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          badgeCircle.setAttribute("cx", String(badgeX));
          badgeCircle.setAttribute("cy", String(badgeY));
          badgeCircle.setAttribute("r", String(badgeRadius));
          badgeCircle.setAttribute("fill", "#fff7ee");
          badgeCircle.setAttribute("stroke", "#a74826");
          badgeCircle.setAttribute("stroke-width", "1.8");

          const badgeCheck = document.createElementNS("http://www.w3.org/2000/svg", "path");
          badgeCheck.setAttribute(
            "d",
            `M ${badgeX - badgeRadius * 0.45} ${badgeY + badgeRadius * 0.02} L ${badgeX - badgeRadius * 0.1} ${badgeY + badgeRadius * 0.38} L ${badgeX + badgeRadius * 0.52} ${badgeY - badgeRadius * 0.34}`
          );
          badgeCheck.setAttribute("fill", "none");
          badgeCheck.setAttribute("stroke", "#a74826");
          badgeCheck.setAttribute("stroke-width", "2");
          badgeCheck.setAttribute("stroke-linecap", "round");
          badgeCheck.setAttribute("stroke-linejoin", "round");

          badge.append(badgeCircle, badgeCheck);
          group.appendChild(badge);
        }

        nodesLayer.appendChild(group);
      });

      if (selectedResult && !connectModeNodeId) {
        const previewNode = getPreviewNode(selectedResult.node.id);
        if (previewNode) {
          const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
          group.setAttribute("class", "preview-node");
          group.dataset.parentId = previewNode.parentId;
          group.setAttribute(
            "transform",
            `translate(${previewNode.x - previewNode.metrics.width / 2}, ${previewNode.y - previewNode.metrics.height / 2})`
          );

          const shape = document.createElementNS("http://www.w3.org/2000/svg", "rect");
          shape.setAttribute("width", String(previewNode.metrics.width));
          shape.setAttribute("height", String(previewNode.metrics.height));

          const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
          text.setAttribute("x", String(previewNode.metrics.width / 2));
          text.setAttribute("y", String(previewNode.metrics.height / 2 + 2));
          text.setAttribute("font-size", String(previewNode.metrics.fontSize));
          text.textContent = previewNode.label;

          group.append(shape, text);
          nodesLayer.appendChild(group);
        }
      }

      applyViewport();
      syncSelectionUI();
      syncProjectMenuUI();
      renderProjectList();
      renderTodayList();
      syncTodayPanelUI();
      syncMemoPanelUI();
      syncConnectModeBanner();
      saveState();
    }

    function syncSelectionUI() {
      const current = selectedId ? findNode(selectedId)?.node : null;
      nodeLabelInput.value = current ? current.label : "";
      nodeLabelInput.disabled = !current;
      todayBtn.classList.toggle("active", Boolean(current?.today));
      todayBtn.classList.toggle("secondary", !current?.today);
      todayBtn.textContent = current?.today ? "오늘할일 해제" : "오늘할일";
      todayBtn.disabled = !current;
      document.getElementById("renameBtn").disabled = !current;
      document.getElementById("addChildBtn").disabled = !current;
      connectBtn.disabled = !current || current.id === state.id;
      unlinkBtn.disabled = !current || current.id === state.id || current.detached;
      document.getElementById("deleteBtn").disabled = !current || current.id === state.id;
      deleteProjectBtn.disabled = appState.projects.length <= 1;
    }

    function syncProjectMenuUI() {
      const activeProject = getActiveProject();
      currentProjectName.textContent = getProjectTitle(activeProject);
      projectToolbar.classList.toggle("open", isProjectMenuOpen);
      projectPanel.hidden = !isProjectMenuOpen;
      projectMenuBtn.setAttribute("aria-expanded", String(isProjectMenuOpen));
      projectMenuBtn.setAttribute("aria-label", isProjectMenuOpen ? "프로젝트 목록 숨기기" : "프로젝트 목록 보기");
    }

    function openProjectMenu() {
      isProjectMenuOpen = true;
      syncProjectMenuUI();
    }

    function closeProjectMenu() {
      isProjectMenuOpen = false;
      syncProjectMenuUI();
    }

    function toggleProjectMenu() {
      isProjectMenuOpen = !isProjectMenuOpen;
      syncProjectMenuUI();
    }

    function renderProjectList() {
      const activeProjectId = getActiveProject().id;
      projectList.innerHTML = appState.projects.map((project) => `
        <button type="button" class="project-chip${project.id === activeProjectId ? " active" : " secondary"}" data-project-id="${project.id}">${getProjectTitle(project)}</button>
      `).join("");
    }

    function switchProject(projectId) {
      if (projectId === appState.activeProjectId) return;
      const nextProject = appState.projects.find((project) => project.id === projectId);
      if (!nextProject) return;
      pushUndoSnapshot();
      appState.activeProjectId = projectId;
      syncActiveProjectState();
      selectedId = null;
      scale = 1;
      closeProjectMenu();
      centerOnNode(state.id);
    }

    function addProject() {
      const defaultName = `프로젝트 ${appState.projects.length + 1}`;
      const inputName = window.prompt("새 프로젝트 이름을 입력하세요.", defaultName);
      if (inputName === null) return;
      pushUndoSnapshot();
      const nextProject = createProject(inputName.trim() || defaultName);
      appState.projects.push(nextProject);
      appState.activeProjectId = nextProject.id;
      syncActiveProjectState();
      selectedId = null;
      scale = 1;
      openProjectMenu();
      centerOnNode(state.id);
    }

    function deleteProject() {
      if (appState.projects.length <= 1) {
        window.alert("프로젝트는 최소 1개는 남아 있어야 합니다.");
        return;
      }
      const activeProject = getActiveProject();
      const shouldDelete = window.confirm(`"${getProjectTitle(activeProject)}" 프로젝트를 삭제할까요?`);
      if (!shouldDelete) return;
      pushUndoSnapshot();
      appState.projects = appState.projects.filter((project) => project.id !== activeProject.id);
      appState.activeProjectId = appState.projects[0].id;
      syncActiveProjectState();
      selectedId = null;
      scale = 1;
      openProjectMenu();
      centerOnNode(state.id);
    }

    function getTodayItems() {
      return flatten(state)
        .filter(({ node }) => node.today)
        .map(({ node }) => {
          const labels = getAncestorLabels(node.id) || [node.label];
          return {
            id: node.id,
            label: node.label,
            path: labels.slice(0, -1).join(" > ")
          };
        });
    }

    function renderTodayList() {
      const items = getTodayItems();
      if (!items.length) {
        todayList.innerHTML = '<p class="empty">아직 체크된 오늘할일이 없습니다. 하단 버튼으로 추가해보세요.</p>';
        return;
      }

      todayList.innerHTML = items.map((item) => `
        <article class="today-item" data-id="${item.id}">
          <p class="path">${item.path || "최상위"}</p>
          <p class="task">${item.label}</p>
        </article>
      `).join("");
    }

    function syncTodayPanelUI() {
      const isCollapsed = Boolean(appState.todayPanelCollapsed);
      todayPanel.classList.toggle("collapsed", isCollapsed);
      todayPanelToggle.setAttribute("aria-expanded", String(!isCollapsed));
      todayPanelToggle.setAttribute("aria-label", isCollapsed ? "오늘할일 펼치기" : "오늘할일 숨기기");
    }

    function syncMemoPanelUI() {
      const isCollapsed = Boolean(appState.memoPanelCollapsed);
      memoPanel.classList.toggle("collapsed", isCollapsed);
      memoPanelToggle.setAttribute("aria-expanded", String(!isCollapsed));
      memoPanelToggle.setAttribute("aria-label", isCollapsed ? "메모 펼치기" : "메모 숨기기");
      if (document.activeElement !== memoInput && memoInput.value !== appState.memo) {
        memoInput.value = appState.memo || "";
      }
      autoResizeMemoInput();
    }

    function autoResizeMemoInput() {
      memoInput.style.height = "auto";
      memoInput.style.height = `${memoInput.scrollHeight}px`;
    }

    function syncConnectModeBanner() {
      connectModeBanner.hidden = !connectModeNodeId;
    }

    function toggleTodayPanel() {
      pushUndoSnapshot();
      appState.todayPanelCollapsed = !appState.todayPanelCollapsed;
      render();
    }

    function toggleMemoPanel() {
      pushUndoSnapshot();
      appState.memoPanelCollapsed = !appState.memoPanelCollapsed;
      render();
    }

    function openInfoWindow() {
      infoModal.hidden = false;
    }

    function closeInfoWindow() {
      infoModal.hidden = true;
    }

    function addChild(parentId) {
      const result = findNode(parentId);
      if (!result) return null;
      pushUndoSnapshot();
      const parent = result.node;
      const newNode = {
        id: crypto.randomUUID(),
        label: "새 노드",
        x: parent.x + 220,
        y: parent.y + Math.max(parent.children.length, 0) * 90 - 40,
        today: false,
        detached: false,
        children: []
      };
      parent.children.push(newNode);
      selectedId = newNode.id;
      render();
      return newNode.id;
    }

    function addDetachedNodeAt(x, y) {
      pushUndoSnapshot();
      const newNode = {
        id: crypto.randomUUID(),
        label: "새 노드",
        x,
        y,
        today: false,
        detached: true,
        children: []
      };
      state.children.push(newNode);
      selectedId = newNode.id;
      connectModeNodeId = null;
      connectHoverNodeId = null;
      render();
      return newNode.id;
    }

    function unlinkNode(targetId) {
      if (!targetId || targetId === state.id) return;
      const result = findNode(targetId);
      if (!result?.parent) return;
      pushUndoSnapshot();
      result.parent.children = result.parent.children.filter((child) => child.id !== targetId);
      result.node.detached = true;
      state.children.push(result.node);
      selectedId = result.node.id;
      render();
    }

    function reattachNode(targetId, nextParentId) {
      if (!targetId || !nextParentId || targetId === nextParentId) return false;
      const nodeResult = findNode(targetId);
      const nextParentResult = findNode(nextParentId);
      if (!nodeResult?.parent || !nextParentResult) return false;
      if (getAncestorIds(nextParentId)?.includes(targetId)) return false;
      if (!nodeResult.node.detached && nodeResult.parent.id === nextParentId) return false;
      pushUndoSnapshot();

      nodeResult.parent.children = nodeResult.parent.children.filter((child) => child.id !== targetId);
      nodeResult.node.detached = false;
      nextParentResult.node.children.push(nodeResult.node);
      selectedId = nodeResult.node.id;
      connectModeNodeId = null;
      connectHoverNodeId = null;
      render();
      return true;
    }

    function beginConnectMode(targetId) {
      if (!targetId) return;
      const current = findNode(targetId)?.node;
      if (!current || current.id === state.id) return;
      connectModeNodeId = targetId;
      connectHoverNodeId = null;
      selectedId = targetId;
      render();
    }

    function findDropTargetNodeId(clientX, clientY, draggingId) {
      const elements = document.elementsFromPoint(clientX, clientY);
      const nodeGroup = elements.find((element) => element?.classList?.contains("node") && element.dataset.id !== draggingId);
      return nodeGroup?.dataset?.id || null;
    }

    function isConnectTarget(nodeId) {
      if (!connectModeNodeId || !nodeId || nodeId === connectModeNodeId) return false;
      const targetNode = findNode(nodeId)?.node;
      if (!targetNode || targetNode.detached) return false;
      return !getAncestorIds(nodeId)?.includes(connectModeNodeId);
    }

    function deleteNode(targetId, mode = "subtree") {
      if (targetId === state.id) return;
      const result = findNode(targetId);
      if (!result?.parent) return;
      const confirmMessage = mode === "single"
        ? `"${result.node.label}" 노드만 삭제할까요?\n하위 노드는 연결선 없는 분리 노드로 남습니다.`
        : `"${result.node.label}" 노드를 삭제할까요?\n하위 노드도 함께 삭제됩니다.`;
      const shouldDelete = window.confirm(confirmMessage);
      if (!shouldDelete) return;
      pushUndoSnapshot();

      const deleteIndex = result.parent.children.findIndex((child) => child.id === targetId);
      if (deleteIndex === -1) return;

      if (mode === "single") {
        const nextChildren = result.node.children.map((child) => ({
          ...child,
          detached: true
        }));
        result.parent.children.splice(deleteIndex, 1);
        state.children.push(...nextChildren);
      } else {
        result.parent.children.splice(deleteIndex, 1);
      }

      selectedId = result.parent.id;
      render();
    }

    function commitNodeLabelChanges() {
      if (!selectedId) return;
      const result = findNode(selectedId);
      if (!result) return;
      const nextLabel = nodeLabelInput.value.trim() || "이름 없는 노드";
      if (result.node.label === nextLabel && (result.node.id !== state.id || getActiveProject().name === nextLabel)) {
        return;
      }
      pushUndoSnapshot();
      if (result.node.id === state.id) {
        getActiveProject().name = nextLabel;
      }
      result.node.label = nextLabel;
      render();
    }

    function renameNode() {
      commitNodeLabelChanges();
    }

    function toggleToday() {
      if (!selectedId) return;
      const result = findNode(selectedId);
      if (!result) return;
      pushUndoSnapshot();
      result.node.today = !result.node.today;
      render();
    }

    function hideNodeContextMenu() {
      nodeContextMenu.hidden = true;
      contextMenuNodeId = null;
    }

    function hideCanvasContextMenu() {
      canvasContextMenu.hidden = true;
      canvasContextPoint = null;
    }

    function positionContextMenu(menu, clientX, clientY) {
      menu.hidden = false;
      menu.style.left = "0px";
      menu.style.top = "0px";
      const menuRect = menu.getBoundingClientRect();
      const margin = 12;
      const left = Math.min(clientX, window.innerWidth - menuRect.width - margin);
      const top = Math.min(clientY, window.innerHeight - menuRect.height - margin);
      menu.style.left = `${Math.max(margin, left)}px`;
      menu.style.top = `${Math.max(margin, top)}px`;
    }

    function showNodeContextMenu(clientX, clientY, nodeId) {
      hideCanvasContextMenu();
      contextMenuNodeId = nodeId;
      const current = findNode(nodeId)?.node;
      nodeContextTodayBtn.textContent = current?.today ? "오늘할일 해제" : "오늘할일";
      nodeContextTodayBtn.disabled = !current;
      nodeContextConnectBtn.disabled = !current || current.id === state.id;
      nodeContextUnlinkBtn.disabled = !current || current.id === state.id || current.detached;
      positionContextMenu(nodeContextMenu, clientX, clientY);
    }

    function showCanvasContextMenu(clientX, clientY) {
      hideNodeContextMenu();
      const point = toSvgPoint(clientX, clientY);
      canvasContextPoint = {
        x: (point.x - translate.x) / scale,
        y: (point.y - translate.y) / scale
      };
      positionContextMenu(canvasContextMenu, clientX, clientY);
    }

    function applyViewport() {
      viewport.setAttribute("transform", `translate(${translate.x} ${translate.y}) scale(${scale})`);
    }

    function toSvgPoint(clientX, clientY) {
      const point = svg.createSVGPoint();
      point.x = clientX;
      point.y = clientY;
      return point.matrixTransform(svg.getScreenCTM().inverse());
    }

    function setScale(nextScale, anchorX, anchorY) {
      const clamped = Math.max(0.2, Math.min(4.5, +nextScale.toFixed(2)));
      if (clamped === scale) return;
      const worldX = (anchorX - translate.x) / scale;
      const worldY = (anchorY - translate.y) / scale;
      scale = clamped;
      translate.x = anchorX - worldX * scale;
      translate.y = anchorY - worldY * scale;
      render();
    }

    function centerOnNode(nodeId = state.id) {
      const result = findNode(nodeId);
      if (!result) return;
      const rect = svg.getBoundingClientRect();
      const centerPoint = toSvgPoint(rect.left + rect.width / 2, rect.top + rect.height / 2);
      translate.x = centerPoint.x - result.node.x * scale;
      translate.y = centerPoint.y - result.node.y * scale;
      render();
    }

    svg.addEventListener("pointerdown", (event) => {
      hideNodeContextMenu();
      if (event.target !== nodeLabelInput) {
        commitNodeLabelChanges();
      }
      if (event.button === 1) {
        event.preventDefault();
        panInfo = {
          startX: event.clientX,
          startY: event.clientY,
          originX: translate.x,
          originY: translate.y
        };
        return;
      }

      const previewNode = event.target.closest(".preview-node");
      if (previewNode) {
        event.preventDefault();
        addChild(previewNode.dataset.parentId);
        return;
      }

      const nodeGroup = event.target.closest(".node");
      if (!nodeGroup) {
        if (connectModeNodeId) {
          connectModeNodeId = null;
          connectHoverNodeId = null;
          render();
          return;
        }
        selectedId = null;
        render();
        return;
      }

      if (connectModeNodeId) {
        const targetId = nodeGroup.dataset.id;
        if (isConnectTarget(targetId)) {
          reattachNode(connectModeNodeId, targetId);
          connectHoverNodeId = null;
          return;
        }
      }

      selectedId = nodeGroup.dataset.id;
      const result = findNode(selectedId);
      if (!result) return;
      const start = toSvgPoint(event.clientX, event.clientY);
      const subtree = collectSubtree(result.node);
      dragInfo = {
        id: selectedId,
        beforeSnapshot: createHistorySnapshot(),
        moved: false,
        pointerX: (start.x - translate.x) / scale,
        pointerY: (start.y - translate.y) / scale,
        nodes: subtree.map((node) => ({
          id: node.id,
          startX: node.x,
          startY: node.y
        }))
      };
      render();
    });

    svg.addEventListener("contextmenu", (event) => {
      const nodeGroup = event.target.closest(".node");
      event.preventDefault();
      if (!nodeGroup) {
        showCanvasContextMenu(event.clientX, event.clientY);
        return;
      }
      selectedId = nodeGroup.dataset.id;
      render();
      showNodeContextMenu(event.clientX, event.clientY, selectedId);
    });

    svg.addEventListener("pointermove", (event) => {
      if (panInfo) {
        translate.x = panInfo.originX + (event.clientX - panInfo.startX) * PAN_SENSITIVITY;
        translate.y = panInfo.originY + (event.clientY - panInfo.startY) * PAN_SENSITIVITY;
        render();
        return;
      }

      if (connectModeNodeId) {
        const nodeGroup = event.target.closest(".node");
        const nextHoverNodeId = nodeGroup && isConnectTarget(nodeGroup.dataset.id) ? nodeGroup.dataset.id : null;
        if (connectHoverNodeId !== nextHoverNodeId) {
          connectHoverNodeId = nextHoverNodeId;
          render();
        }
        return;
      }

      if (!dragInfo) return;
      const point = toSvgPoint(event.clientX, event.clientY);
      const nextPointerX = (point.x - translate.x) / scale;
      const nextPointerY = (point.y - translate.y) / scale;
      const deltaX = nextPointerX - dragInfo.pointerX;
      const deltaY = nextPointerY - dragInfo.pointerY;
      if (Math.abs(deltaX) > 0.5 || Math.abs(deltaY) > 0.5) {
        dragInfo.moved = true;
      }

      dragInfo.nodes.forEach((entry) => {
        const nodeResult = findNode(entry.id);
        if (!nodeResult) return;
        nodeResult.node.x = entry.startX + deltaX;
        nodeResult.node.y = entry.startY + deltaY;
      });
      render();
    });

    window.addEventListener("pointerup", () => {
      if (dragInfo?.moved && dragInfo.beforeSnapshot) {
        pushUndoSnapshot(dragInfo.beforeSnapshot);
      }
      dragInfo = null;
      panInfo = null;
    });

    window.addEventListener("click", (event) => {
      if (!nodeContextMenu.hidden && !event.target.closest("#nodeContextMenu")) {
        hideNodeContextMenu();
      }
      if (!canvasContextMenu.hidden && !event.target.closest("#canvasContextMenu")) {
        hideCanvasContextMenu();
      }
      if (isProjectMenuOpen && !event.target.closest(".project-toolbar")) {
        closeProjectMenu();
      }
      if (!infoModal.hidden && event.target === infoModal) {
        closeInfoWindow();
      }
    });

    svg.addEventListener("mousedown", (event) => {
      if (event.button === 1) {
        event.preventDefault();
      }
    });

    svg.addEventListener("dblclick", (event) => {
      const nodeGroup = event.target.closest(".node");
      if (!nodeGroup) return;
      addChild(nodeGroup.dataset.id);
    });

    svg.addEventListener("wheel", (event) => {
      event.preventDefault();
      const point = toSvgPoint(event.clientX, event.clientY);
      const direction = event.deltaY > 0 ? -0.1 : 0.1;
      setScale(scale + direction, point.x, point.y);
    }, { passive: false });

    document.getElementById("renameBtn").addEventListener("click", renameNode);
    todayBtn.addEventListener("click", toggleToday);
    todayPanelToggle.addEventListener("click", toggleTodayPanel);
    memoPanelToggle.addEventListener("click", toggleMemoPanel);
    openInfoWindowBtn.addEventListener("click", openInfoWindow);
    closeInfoWindowBtn.addEventListener("click", closeInfoWindow);
    document.getElementById("addChildBtn").addEventListener("click", () => {
      if (!selectedId) return;
      addChild(selectedId);
    });
    connectBtn.addEventListener("click", () => {
      beginConnectMode(selectedId);
    });
    unlinkBtn.addEventListener("click", () => {
      unlinkNode(selectedId);
    });
    document.getElementById("deleteBtn").addEventListener("click", () => {
      if (!selectedId) return;
      deleteNode(selectedId);
    });
    addProjectBtn.addEventListener("click", addProject);
    deleteProjectBtn.addEventListener("click", deleteProject);

    nodeLabelInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") renameNode();
    });

    nodeLabelInput.addEventListener("blur", () => {
      commitNodeLabelChanges();
    });

    memoInput.addEventListener("input", () => {
      if (!memoHistorySnapshot) {
        memoHistorySnapshot = createHistorySnapshot();
      }
      appState.memo = memoInput.value;
      autoResizeMemoInput();
      saveState();
    });

    memoInput.addEventListener("blur", () => {
      if (!memoHistorySnapshot) return;
      pushUndoSnapshot(memoHistorySnapshot);
      memoHistorySnapshot = null;
    });

    window.addEventListener("keydown", (event) => {
      const isUndo = (event.ctrlKey || event.metaKey) && !event.shiftKey && event.key.toLowerCase() === "z";
      if (isUndo) {
        const target = event.target;
        if (target instanceof HTMLTextAreaElement || target instanceof HTMLInputElement || target?.isContentEditable) {
          return;
        }
        event.preventDefault();
        undoLastAction();
        return;
      }
      if (event.key === "Escape") {
        hideNodeContextMenu();
        hideCanvasContextMenu();
        closeProjectMenu();
        closeInfoWindow();
        if (connectModeNodeId) {
          connectModeNodeId = null;
          connectHoverNodeId = null;
          render();
        }
      }
      if (event.key !== "Delete") return;
      const target = event.target;
      if (target instanceof HTMLInputElement || target instanceof HTMLTextAreaElement || target?.isContentEditable) {
        return;
      }
      event.preventDefault();
      if (!selectedId) return;
      deleteNode(selectedId);
    });

    nodeContextDeleteBtn.addEventListener("click", () => {
      const targetId = contextMenuNodeId || selectedId;
      hideNodeContextMenu();
      deleteNode(targetId);
    });

    nodeContextDeleteOnlyBtn.addEventListener("click", () => {
      const targetId = contextMenuNodeId || selectedId;
      hideNodeContextMenu();
      deleteNode(targetId, "single");
    });

    nodeContextTodayBtn.addEventListener("click", () => {
      const targetId = contextMenuNodeId || selectedId;
      hideNodeContextMenu();
      if (!targetId) return;
      selectedId = targetId;
      toggleToday();
    });

    nodeContextAddBtn.addEventListener("click", () => {
      const targetId = contextMenuNodeId || selectedId;
      hideNodeContextMenu();
      if (!targetId) return;
      addChild(targetId);
    });

    nodeContextConnectBtn.addEventListener("click", () => {
      const targetId = contextMenuNodeId || selectedId;
      hideNodeContextMenu();
      beginConnectMode(targetId);
    });

    nodeContextUnlinkBtn.addEventListener("click", () => {
      const targetId = contextMenuNodeId || selectedId;
      hideNodeContextMenu();
      connectModeNodeId = null;
      connectHoverNodeId = null;
      unlinkNode(targetId);
    });

    canvasContextAddBtn.addEventListener("click", () => {
      const point = canvasContextPoint;
      hideCanvasContextMenu();
      if (!point) return;
      addDetachedNodeAt(point.x, point.y);
    });

    projectMenuBtn.addEventListener("click", () => {
      toggleProjectMenu();
    });

    projectList.addEventListener("click", (event) => {
      const projectButton = event.target.closest("[data-project-id]");
      if (!projectButton) return;
      switchProject(projectButton.dataset.projectId);
    });

    todayList.addEventListener("click", (event) => {
      const item = event.target.closest(".today-item");
      if (!item) return;
      selectedId = item.dataset.id;
      centerOnNode(selectedId);
    });

    if ("serviceWorker" in navigator && window.isSecureContext) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch((error) => {
          console.warn("Service worker registration failed:", error);
        });
      });
    }

    scale = 1;
    centerOnNode(state.id);
  </script>
</body>
</html>
